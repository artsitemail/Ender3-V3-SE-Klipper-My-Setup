# ====================================================================
#  MACRO M600 (FALLBACK SPLICER)
# ====================================================================
[gcode_macro M600]
description: Troca de filamento simples (M600 fallback)
gcode:
  TROCA_COR EXTRUSOR=0

# ====================================================================
#  MULTICOLOR & TROCA DE COR INTERATIVA (INTERFACE FIXA)
# ====================================================================
[gcode_macro TROCA_COR]
description: Troca de cor com ecrã interativo e retração suave
gcode:
  {% set ext = params.EXTRUSOR | default(0) | int %}
  {% set nome_orca = params.NOME | default("") | trim %}
  
  # Lógica de prioridade de cor
  {% if nome_orca != "" %}
    {% set cor = nome_orca %}
  {% else %}
    {% set lista = printer['gcode_macro _SET_CORES'].lista %}
    {% set cores = lista.split(',') %}
    {% set cor = cores[ext].strip() if ext < cores | length and cores[ext].strip() != "" else "Filamento " ~ (ext + 1) %}
  {% endif %}
  
  # Guarda temperatura e altera skip_unretract para o RESUME
  SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=last_extruder_temp VALUE={printer.extruder.target}
  SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=skip_unretract VALUE=True
  
  PAUSE_BASE
  
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 E-5 F1200                    # Retração de 5mm SUAVE para puxar o filamento antigo sem encravar
    {% set cur_z = printer.toolhead.position.z %}
    {% set max_z = printer.toolhead.axis_maximum.z %}
    {% set safe_z = [cur_z + 20.0, max_z - 2.0] | min %}
    G90
    G1 Z{safe_z} F900               # Z Seguro
    G1 X10 Y10 F12000               # Esquerda + Trás (Excelente acesso ao extrusor)
    BEEP P=400
    
    # ----------------------------------------------------------------
    #  CONSTRUÇÃO DO ECRÃ FIXO COM BOTÕES (AÇÃO PROMPT)
    #  Aparece de forma nativa no Fluidd e KlipperScreen
    # ----------------------------------------------------------------
    RESPOND TYPE=command MSG="action:prompt_begin MUDANÇA DE FILAMENTO"
    RESPOND TYPE=command MSG="action:prompt_text Próxima Cor/Filamento detetado:"
    RESPOND TYPE=command MSG="action:prompt_text ▶ {cor} (T{ext})"
    RESPOND TYPE=command MSG="action:prompt_text "
    RESPOND TYPE=command MSG="action:prompt_text Instale o novo filamento. Se demorar mais de 5min o bico irá arrefecer."
    RESPOND TYPE=command MSG="action:prompt_text Use o botão 'Reaquecer Bico' caso o mesmo se encontre frio antes de empurrar."
    
    # Botões do Menu Interativo
    RESPOND TYPE=command MSG="action:prompt_footer_button REAQUECER BICO|_REAQUECER_PAUSA|secondary"
    RESPOND TYPE=command MSG="action:prompt_footer_button CANCELAR IMPRESSÃO|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_footer_button RETOMAR [RESUME]|RESUME|primary"
    RESPOND TYPE=command MSG="action:prompt_show"
    
    # Cópia para a consola de texto
    RESPOND TYPE=echo MSG=">>> TROCA_COR: Coloque {cor} (T{ext}). Se arrefecer, prima Reaquecer."
    
    # Ativa temporizador de 5 minutos
    UPDATE_DELAYED_GCODE ID=DESLIGAR_BICO_TIMEOUT DURATION=300
  {% else %}
    RESPOND MSG="Erro: impressora sem homing!"
  {% endif %}

[gcode_macro _REAQUECER_PAUSA]
description: Helper interno para voltar a ligar o bico na temperatura guardada antes do timeout
gcode:
  {% set saved_temp = printer['gcode_macro PAUSE'].last_extruder_temp | float %}
  {% if saved_temp > 0 %}
    RESPOND MSG="A reaquecer bico para {saved_temp | int}°C..."
    M104 S{saved_temp}
    M109 S{saved_temp}
    RESPOND MSG="Bico quente e pronto para troca de filamento!"
  {% else %}
    RESPOND MSG="Erro: Nenhuma temperatura anterior guardada. Defina manualmente."
  {% endif %}

# ====================================================================
#  PLACEHOLDERS FALSOS PARA O ORCASLICER (T0 - T9)
# ====================================================================
[gcode_macro T0]
gcode:
  RESPOND MSG="T0 invocado"

[gcode_macro T1]
gcode:
  RESPOND MSG="T1 invocado"

