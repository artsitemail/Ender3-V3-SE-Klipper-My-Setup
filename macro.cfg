[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  ; Ativa as coordenadas personalizadas abaixo
variable_custom_park_x    : 10.0  ; Envia o bico para a esquerda (X10)
variable_custom_park_y    : 220.0 ; Empurra a mesa totalmente para TRÁS (Y220)
variable_custom_park_dz   : 5.0   ; Faz o salto Z-Hop de 5mm ao pausar
gcode:
    M118 Variaveis carregadas com sucesso.

# ====================================================================
# MACRO PARA CALIBRAÇÃO DO Z-OFFSET 100% AUTOMÁTICO COM ECRÃ
# ====================================================================

[gcode_macro CALIBRAR_Z_OFFSET]
description: Executa o alinhamento e cálculo automático do Z-Offset
gcode:
    # 1. Avisa o ecrã e faz o Home completo em segurança
    M117 Fazendo Home...
    CHOME
    
    # 2. Executa a rotina do sensor de força (Prtouch)
    M117 Calibrando Z...
    RESPOND MSG="A iniciar calibração automática do Z-Offset..."
    PRTOUCH_PROBE_ZOFFSET
    
    # 3. Guarda permanentemente as definições no ficheiro e reinicia
    M117 Guardando...
    RESPOND MSG="Calibração concluída! A guardar dados..."
    SAVE_CONFIG
 
# ====================================================================
# MACRO DE INÍCIO E FIM DE IMPRESSÃO (INTEGRAÇÃO KAMP)
# ====================================================================

[gcode_macro PRINT_START]
description: Prepara a impressora e aquece mesa e extrudor
gcode:
  {% set bed_temp = params.BED | default(60) | float %}
  {% set extruder_temp = params.EXTRUDER | default(220) | float %}
  
  CLEAR_PAUSE ; Limpa pausas antigas
  
  # Dispara os dois aquecedores juntos em background
  M140 S{bed_temp}        ; Liga o aquecimento da mesa
  M104 S150               ; Pre-aquece o bico a 150C (temperatura segura para nao babar)

  # ESPERA ATÉ ENTRAREM NA TEMPERATURA CORRETA
  M190 S{bed_temp}        ; Aguarda que a mesa atinja o valor final
  
  G28 ; Executa o Homing em seguranca com a mesa quente
  
  M104 S{extruder_temp}   ; Da ordem para o bico subir para a temperatura final de impressao
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5 ; Executa o nivelamento adaptativo do KAMP
  
  G0 X1 Y1 Z1 F5000       ; Move para o canto frontal esquerdo para se preparar
  M109 S{extruder_temp}   ; Aguarda o bico atingir o valor final de fusao
  
  ADAPTIVE_LINE_PURGE     ; Executa a purga inteligente do KAMP e começa a imprimir!


[gcode_macro PRINT_END]
description: Finaliza a impressao em seguranca
gcode:
  G91                               ; Posicionamento relativo
  G1 E-2 F2700                      ; Retrai o filamento um pouco (2mm)
  G1 E-2 Z0.2 F2400                 ; Retrai mais um pouco e levanta o eixo Z ligeiramente
  G0 X5 Y5 F3000                    ; Afastamento rapido para limpar o bico
  G0 Z10                            ; Eleva o eixo Z mais 10mm
  G90                               ; Retorna ao posicionamento absoluto
  G0 X0 Y220                        ; Puxa a mesa para a frente (Apresenta a peca)
  M106 S0                           ; Desliga a ventoinha de peca
  M104 S0                           ; Desliga o aquecimento do bico
  M140 S0                           ; Desliga o aquecimento da mesa
  M84                               ; Desativa os motores de passo

[pause_resume]

# ====================================================================
# MACROS DE CONTROLO DE IMPRESSÃO (CANCELAR / PAUSAR / RETOMAR)
# ====================================================================

[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print safely
rename_existing: CANCEL_PRINT_BASE
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set retract = client.cancel_retract | default(5.0) | abs %}
  
  {% if printer['gcode_macro PAUSE'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro PAUSE'].restore_idle_timeout}
  {% endif %}
  
  _CLIENT_RETRACT LENGTH={retract}
  TURN_OFF_HEATERS
  M106 S0
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  
  # MOVIMENTOS FÍSICOS SEGUROS E TRANCADOS (BICO À ESQUERDA, MESA À FRENTE)
  G91               ; Modo relativo para o salto
  G1 Z10 F600       ; Sobe o bico 10mm de segurança
  G90               ; Modo absoluto para as coordenadas fixas
  G1 X10 Y220 F4000 ; TRANCADO: Bico em X10 (Esquerda) e mesa em Y220 (Frente)
  M84               ; Desliga os motores


[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
variable_restore_idle_timeout: 0
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set idle_timeout = client.idle_timeout | default(0) %}
  {% set temp = printer[printer.toolhead.extruder].target if printer.toolhead.extruder != '' else 0 %}
  {% set restore = printer.toolhead.extruder != '' and params.RESTORE | default(1) | int == 1 %}
  ##### end of definitions #####
  SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE="{{'restore': restore, 'temp': temp}}"
  # set a new idle_timeout value
  {% if idle_timeout > 0 %}
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=restore_idle_timeout VALUE={printer.configfile.settings.idle_timeout.timeout}
    SET_IDLE_TIMEOUT TIMEOUT={idle_timeout}
  {% endif %}
  PAUSE_BASE
  _TOOLHEAD_PARK_PAUSE_CANCEL {rawparams}

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
variable_last_extruder_temp: {'restore': False, 'temp': 0}
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set sp_move = client.speed_move | default(velocity) %}
  ##### end of definitions #####
  # restore idle_timeout time if needed
  {% if printer['gcode_macro PAUSE'].restore_idle_timeout > 0 %}
    SET_IDLE_TIMEOUT TIMEOUT={printer['gcode_macro PAUSE'].restore_idle_timeout}
  {% endif %}
  {% if printer.idle_timeout.state | upper == "IDLE" and last_extruder_temp.restore %}
    M109 S{last_extruder_temp.temp}
  {% endif %}
  _CLIENT_EXTRUDE
  RESUME_BASE VELOCITY={params.VELOCITY | default(sp_move)}

# ====================================================================
# PONTE MULTICOLOR COM ALERTAS VISUAIS NO ECRÃ DA IMPRESSORA
# ====================================================================
[gcode_macro M600]
description: Intervencao de mudanca de filamento gerada pelo OrcaSlicer
gcode:
    # 1. Alerta sonoro inicial e aviso no ecrã físico da impressora
    M117 Alerta: Troca!
    RESPOND MSG="Mudança de cor detetada! A preparar pausa..."
    BEEP P=150
    G4 P200
    BEEP P=150
    
    # 2. Aciona a pausa nativa (Fuga automática para X10 Y220 Z+5)
    PAUSE
    
    # 3. TEXTO DEFINITIVO QUE FICA PRESO NO ECRÃ ORIGINAL DA ENDER:
    M117 Troque o Rolo!
    RESPOND MSG="Impressora pausada em X10 Y220. Aguardando novo filamento..."


# ====================================================================
# SUPORTE PARA CONTROLO E PAUSA POR CAMADAS (LAYERS)
# ====================================================================  
  
# Usage: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE | default(1) | int != 0 %}
  {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable/disable a pause if a given layer number is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
  {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
  {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Usage: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}  
  

# Usage: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE | default(1) | int != 0 %}
  {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable/disable a pause if a given layer number is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
  {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
  {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

# Usage: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}
  
   
# ====================================================================
# CONFIGURAÇÕES TOOLHEAD_PARK_PAUSE_CANCEL
# ====================================================================   
   
##### internal use #####
[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  
  # DEFINIÇÃO DE ALTURA DE SEGURANÇA (Z-HOP DE 5MM)
  {% set park_dz        = 5.0 %} 
  {% set sp_hop         = client.speed_hop | default(15) * 60 %}
  {% set sp_move        = client.speed_move | default(velocity) * 60 %}
  
  {% set act       = printer.gcode_move.gcode_position %}
  {% set max       = printer.toolhead.axis_maximum %}
  {% set origin    = printer.gcode_move.homing_origin %}
  
  # Calcula a altura Z limite para nao bater no topo fisico da impressora
  {% set z_park = [[(act.z + park_dz), 0.0] | max, (max.z - origin.z)] | min %}
  
  ##### EXECUÇÃO AUTOMÁTICA DA RETRAÇÃO DE ALÍVIO #####
  _CLIENT_RETRACT
  
  ##### MOVIMENTO FÍSICO FORÇADO (BICO À ESQUERDA, MESA PARA TRÁS) #####
  {% if "xyz" in printer.toolhead.homed_axes %}
    G90                             ; Forca o modo de coordenadas absolutas
    G1 Z{z_park} F{sp_hop}          ; Executa o salto de 5mm para cima primeiro
    G1 X10 Y220 F{sp_move}          ; TRANCADO: Bico vai para X=10, Mesa vai para tras Y=220
    {% if not printer.gcode_move.absolute_coordinates %} G91 {% endif %}
  {% else %}
    RESPOND TYPE=echo MSG='Printer not homed'
  {% endif %}
   
[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes, if the extruder is hot enough
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set use_fw_retract = (client.use_fw_retract | default(false) | lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH | default(client.unretract) | default(2.0) | float %}
  {% set speed = params.SPEED | default(client.speed_unretract) | default(35) %}
  {% set absolute_extrude = printer.gcode_move.absolute_extrude %}
  ##### end of definitions #####
  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        {% if length < 0 %}
          G10
        {% else %}
          G11
        {% endif %}
      {% else %}
        M83
        G1 E{length} F{(speed | float | abs) * 60}
        {% if absolute_extrude %}
          M82
        {% endif %}
      {% endif %}
    {% else %}
      RESPOND TYPE=echo MSG='Extruder not hot enough'
    {% endif %}
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Retracts, if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set length = params.LENGTH | default(client.retract) | default(5.0) | float %}
  {% set speed = params.SPEED | default(client.speed_retract) | default(35) %}

  _CLIENT_EXTRUDE LENGTH=-{length | float | abs} SPEED={speed | float | abs}


# ====================================================================
# REGRAS DE SOBREPOSIÇÃO G-CODE (AQUECIMENTO RÁPIDO)
# ====================================================================

[gcode_macro M109]
rename_existing: M99109
gcode:
  {% set s = params.S|float %}
  M104 {% for p in params %} {'%s%s' % (p, params[p])} {% endfor %}
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
  {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
  {% set s = params.S|float %}
  M140 {% for p in params %} {'%s%s' % (p, params[p])} {% endfor %}
  {% if s != 0 %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}
  {% endif %}

# ====================================================================
# MACROS DE CALIBRAÇÃO TÉRMICA (PID) POR VARIÁVEL
# ====================================================================

[gcode_macro PID_EXTRUDER]
description: Calibracao PID do bico com alvo ajustavel (Ex: PID_EXTRUDER TARGET=220)
gcode:
  {% set target = params.TARGET|default(220)|float %}
  RESPOND MSG="A iniciar teste PID do bico..."
  PID_CALIBRATE HEATER=extruder TARGET={target}
  SAVE_CONFIG

[gcode_macro PID_BED]
description: Calibracao PID da mesa com alvo ajustavel (Ex: PID_BED TARGET=60)
gcode:
  {% set target = params.TARGET|default(60)|float %}
  RESPOND MSG="A iniciar teste PID da mesa..."
  PID_CALIBRATE HEATER=heater_bed TARGET={target}
  SAVE_CONFIG

# ====================================================================
# UTILITÁRIOS: FILAMENTO, SINAL SONORO E DESLIGAMENTO
# ====================================================================

[gcode_macro LOAD_FILAMENT]
description: Carrega o filamento
variable_load_distance = 40
variable_purge_distance = 30
gcode:
  {% set load_speed = params.LOAD_SPEED|default(1500)|float %}
  {% set purge_speed = params.PURGE_SPEED|default(300)|float %}
  {% set min_temp = params.MIN_TEMP|default(220)|float %}
  {% set turn_off_extruder = params.TURN_OFF_EXTRUDER|default(1)|int %}
  SAVE_GCODE_STATE NAME=load_state
  {% if printer.extruder.temperature < min_temp %}
    M109 S{min_temp}
  {% endif %}
  G91
  G92 E0
  G1 E{load_distance} F{load_speed}
  G1 E{purge_distance} F{purge_speed}
  {% if turn_off_extruder %}
    M104 S0
  {% endif %}
  RESTORE_GCODE_STATE NAME=load_state
  M118 Filamento Carregado

[gcode_macro UNLOAD_FILAMENT]
description: Descarrega o filamento
variable_unload_distance: 80
variable_purge_distance: 20
gcode:
  {% set unload_speed = params.UNLOAD_SPEED|default(1500)|float %}
  {% set purge_speed = params.PURGE_SPEED|default(300)|float %}
  {% set min_temp = params.MIN_TEMP|default(220)|float %}
  {% set turn_off_extruder = params.TURN_OFF_EXTRUDER|default(1)|int %}
  SAVE_GCODE_STATE NAME=unload_state
  {% if printer.extruder.temperature < min_temp %}
    M109 S{min_temp}
  {% endif %}
  G91
  G92 E0
  G1 E{purge_distance} F{purge_speed}
  G1 E-{unload_distance} F{unload_speed}
  {% if turn_off_extruder %}
    M104 S0
  {% endif %}
  RESTORE_GCODE_STATE NAME=unload_state
  M118 Filamento Descarregado

[gcode_macro BEEP]
gcode:
  {% set duration = params.P|default(100)|float %}
  SET_PIN PIN=beeper VALUE=1
  G4 P{duration}
  SET_PIN PIN=beeper VALUE=0
 
[gcode_macro OFF]
description: Desligar impressora
gcode:
  M84
  TURN_OFF_HEATERS
  M107

[gcode_macro POWER_OFF_PRINTER]
description: Redireciona o comando do fatiador para a macro OFF nativa
gcode:
    OFF


# ====================================================================
# LÓGICA INTERNA DA PURGA ADAPTATIVA DO KAMP
# ====================================================================

[gcode_macro ADAPTIVE_LINE_PURGE]
description: Linha de purga adaptativa
variable_purge_height: 0.3 
variable_tip_distance: 4 
variable_purge_margin: 10 
variable_purge_amount: 40 
variable_flow_rate: 12 
gcode:
  {% set travel_speed = printer.toolhead.max_velocity * 60 %}
  {% set cross_section = printer.configfile.settings.extruder.max_extrude_cross_section | float %}
  {% set RETRACT = 'G10' if printer.firmware_retraction is defined else 'G1 E-0.5 F2100' %}
  {% set UNRETRACT = 'G11' if printer.firmware_retraction is defined else 'G1 E0.5 F2100' %}
  {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
  {% set x_min = (all_points | map(attribute=0) | min | default(0)) %}
  {% set x_max = (all_points | map(attribute=0) | max | default(0)) %}
  {% set y_min = (all_points | map(attribute=1) | min | default(0)) %}
  {% set y_max = (all_points | map(attribute=1) | max | default(0)) %}
  {% set x_center = ([((x_max + x_min) / 2) - (purge_amount / 2), 0] | max) %}
  {% set y_center = ([((y_max + y_min) / 2) - (purge_amount / 2), 0] | max) %}
  {% set x_origin = ([x_min - purge_margin, 0] | max) %}
  {% set y_origin = ([y_min - purge_margin, 0] | max) %}
  {% set purge_move_speed = (flow_rate / 5.0) * 60 | float %}
  
  SAVE_GCODE_STATE NAME=prepurge_state
  G92 E0
  G0 F{travel_speed}
  G90
  G0 X{x_center if y_origin > 0 else x_origin} Y{y_origin if y_origin > 0 else y_center}
  G0 Z{purge_height}
  M83
  G1 E{tip_distance} F{purge_move_speed}
  {% if y_origin > 0 %}
    G1 X{x_center + purge_amount} E{purge_amount} F{purge_move_speed}
    {RETRACT}
    G0 X{x_center + purge_amount + 10} F{travel_speed}
  {% else %}
    G1 Y{y_center + purge_amount} E{purge_amount} F{purge_move_speed}
    {RETRACT}
    G0 Y{y_center + purge_amount + 10} F{travel_speed}
  {% endif %}
  G0 Z{purge_height * 2} F{travel_speed}
  {UNRETRACT}
  G92 E0
  M82
  RESTORE_GCODE_STATE NAME=prepurge_state

# ====================================================================
# HELPER: FAZ O HOME APENAS SE OS EIXOS NÃO ESTIVEREM POSICIONADOS
# ====================================================================
[gcode_macro CHOME]
description: Faz o Home apenas se os eixos já não estiverem posicionados
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

# ====================================================================
# MACRO DE BACKUP AUTOMÁTICO PARA O GITHUB (VORON TOOLS)
# ====================================================================

[gcode_shell_command backup_cfg]
command: /home/klipper/printer_data/config/autocommit.sh
timeout: 30.0
verbose: True

[gcode_macro BACKUP_GITHUB]
description: Envia todas as configurações atuais para o GitHub privado
gcode:
    RUN_SHELL_COMMAND CMD=backup_cfg


# ====================================================================
# MACRO DE PURGA NO AR COM TEXTO NO ECRÃ FÍSICO E NO FLUIDD
# ====================================================================

[gcode_macro PURGAR_FILAMENTO_NO_AR]
description: Eleva a cabeca 5cm e pergunta a temperatura e quantidade de purga
variable_temperatura: 220
variable_comprimento_mm: 50
gcode:
  {% set TEMP = params.TEMPERATURA | default(temperatura) | float %}
  {% set COMPRIMENTO = params.COMPRIMENTO_MM | default(comprimento_mm) | float %}
  
  # ESCREVE NO FLUIDD E NO ECRÃ DA IMPRESSORA:
  RESPOND MSG="A preparar purga: A subir e a aquecer..."
  M117 Aquecendo...
  
  {% if printer.toolhead.homed_axes != "xyz" %}
      G28
  {% endif %}
  
  # Move a cabeca para 5cm de altura
  G90                        
  G1 Z50 F1500               
  G1 X110 Y110 F6000         
  
  # Aquece o bico
  M109 S{TEMP}
  
  # Altera a mensagem no ecrã físico para o momento da extrusão
  RESPOND MSG="Bico quente. A purgar filamento..."
  M117 Purgando...
  
  M83                        
  G1 E{COMPRIMENTO} F150     
  G4 P1000                   
  
  G1 E-2 F1200
  
  # Limpa o ecrã físico no fim
  RESPOND MSG="Purga concluída com sucesso!"
  M117 Pronto!

# ====================================================================
# MACRO PARA SALVAR O AJUSTE FINO (BABYSTEPPING) DA PRIMEIRA CAMADA
# ====================================================================
[gcode_macro GRAVAR_Z_OFFSET]
description: Aplica o ajuste fino efetuado na primeira camada e guarda no SSD
gcode:
    # 1. Avisa o ecra fisico original da impressora e a consola
    M117 Gravando Z...
    RESPOND MSG="A aplicar ajuste fino do Z-Offset..."
    
    # 2. Comando oficial do Klipper para somar o ajuste temporario ao Z definitivo
    Z_OFFSET_APPLY_PROBE
    G4 P500
    
    # 3. Tranca os dados na memoria e reinicia a maquina de forma segura
    RESPOND MSG="Z-Offset atualizado com sucesso! A reiniciar o sistema..."
    M117 Reiniciando...
    SAVE_CONFIG

# ====================================================================
# MACRO DE RESTAURO AUTOMÁTICO VIA GITHUB (RECUPERAÇÃO COMPLETA)
# ====================================================================
[gcode_shell_command restaurar_cfg]
command: /home/klipper/printer_data/config/restore.sh
timeout: 30.0
verbose: True

[gcode_macro RESTAURAR_GITHUB]
description: Apaga as configs locais e puxa o backup perfeito do GitHub
gcode:
    # 1. Avisa o utilizador do início do processo perigoso
    RESPOND MSG="Atenção: A iniciar restauro total do sistema a partir do GitHub..."
    M117 Restaurando...
    
    # 2. Executa o script que limpa o disco e puxa a nuvem
    RUN_SHELL_COMMAND CMD=restaurar_cfg
    G4 P2000
    
    # 3. Força o reinício completo para carregar os ficheiros recuperados
    RESPOND MSG="Restauro concluído com sucesso! A reiniciar o firmware..."
    M117 Concluido!
    SAVE_CONFIG



