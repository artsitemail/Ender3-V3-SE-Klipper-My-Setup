# ====================================================================
# schnoog settings
# M600 separado
# ====================================================================

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos    : True
variable_custom_park_x     : 10.0   ; Extrusor à ESQUERDA (X10)
variable_custom_park_y     : 220.0  ; Mesa para a FRENTE (Y220)
variable_custom_park_dz    : 2.0    ; Z-Hop ao pausar
variable_retract           : 1.0    ; Retrai 2mm ao pausar
variable_cancel_retract    : 2.0    ; Retrai 2mm ao cancelar
variable_speed_retract     : 35     ; Velocidade de retração suave (mm/s)
variable_unretract         : 1.0    ; 1mm ao retomar (utilizador empurra o resto)
variable_speed_unretract   : 30     ; Velocidade de desretração suave (mm/s)
variable_speed_hop         : 15     ; Z-hop a 15mm/s (= max_z_velocity)
variable_speed_move        : 120    ; Velocidade rápida de viagem X/Y para o canto (em mm/s)
gcode:
    M118 Variaveis carregadas.


# ====================================================================
# HOMING CONDICIONAL
# ====================================================================
[gcode_macro CHOME]
description: Faz Home apenas se os eixos nao estiverem posicionados
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}


# ====================================================================
# INÍCIO DE IMPRESSÃO
# ====================================================================

[gcode_macro PRINT_START] 
description: Prepara a impressora, nivela e purga antes de imprimir
[gcode_macro PRINT_START] 
description: Prepara a impressora, nivela e purga antes de imprimir
gcode:
  {% set bed_temp      = params.BED      | default(60)  | float %}
  {% set extruder_temp = params.EXTRUDER | default(220) | float %}

  CLEAR_PAUSE

  M140 S{bed_temp}        ; Mesa a aquecer em background
  M104 S150               ; Bico a 150°C — seguro para home sem babar

  M190 S{bed_temp}        ; Aguarda mesa estabilizar
  CHOME                   ; Home com mesa quente (offset correto)

  M104 S{extruder_temp}   ; Bico para temperatura de impressão
  RESPOND MSG="A nivelar a mesa (mesh adaptativo)..."
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5

  G0 X5 Y5 Z1 F12000   ; Move para zona de purga
  M109 S{extruder_temp}   ; Aguarda temperatura de fusão

# ====================================================================
# FIM DE IMPRESSÃO
# ====================================================================

[gcode_macro PRINT_END]
variable_machine_depth: 220
gcode:
  {% set max_z = printer.toolhead.axis_maximum.z | float %}
  {% set act_z = printer.gcode_move.gcode_position.z | float %}
  {% set z_safe = 50.2 %}
  {% if (act_z + z_safe) > max_z %}
    {% set z_safe = max_z - act_z %}
  {% endif %}

  ; ---- Movimentos só se os eixos estiverem homed ----
  {% if "xyz" in printer.toolhead.homed_axes %}
    G91
    G1 E-2 F2700
    {% if z_safe > 0.2 %}
      G1 E-2 Z0.2 F2400
      G1 X5 Y5 F3000
      G1 Z{z_safe - 0.2} F900
    {% else %}
      G1 E-2 F2400
      G1 X5 Y5 F3000
    {% endif %}
    G90
    G1 X0 Y{machine_depth} F10800
  {% else %}
    RESPOND MSG="Eixos sem homing — a desligar sem mover."
  {% endif %}

  ; ---- Sempre desliga tudo independentemente do homing ----
  M106 S0
  M104 S0
  M140 S0
  M84 X Y E
  BEEP
  RESPOND MSG="Impressao terminada!"


# ====================================================================
# PAUSAR
# ====================================================================

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    # Parâmetros
    {% set z = params.Z|default(10)|int %}                                       ; altura do z-hop

    {% if printer['pause_resume'].is_paused|int == 0 %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                  ; guarda o z-hop para o resume
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target} ; guarda a temperatura atual de impressão

        SAVE_GCODE_STATE NAME=PAUSE                                             ; guarda a posição atual da impressão
        BASE_PAUSE                                                              ; pausa a impressão nativamente
        
        # --- Retração imediata de 2mm ao pausar ---
        G91                                                                     ; posicionamento relativo
        M83                                                                     ; extrusor relativo
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 E-1 F2700                                                        ; retrai 1mm a 45mm/s (35*60=2100)
        {% endif %}

        # --- Subida de Z-Hop ---
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}
            G1 Z{z} F900                                                        ; sobe o eixo Z
        {% else %}
            { action_respond_info("Pause zhop ultrapassa a altura máxima de Z.") }
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        
        G90                                                                     ; posicionamento absoluto
        _TOOLHEAD_PARK_PAUSE_CANCEL                                             ; vai para o canto (X10 Y220, definido nas tuas variáveis)
        SAVE_GCODE_STATE NAME=PAUSEPARK                                         ; guarda a posição de park

        SET_IDLE_TIMEOUT TIMEOUT=43200                                          ; define timeout para 12 horas (mantém motores ligados)
        
        # --- Inicia o temporizador de 2 minutos (120 segundos) ---
        M118 Pausado. Mantendo temperatura por 2 min...
        UPDATE_DELAYED_GCODE ID=COOLDOWN_PAUSE DURATION=120
    {% endif %}
    
    RESPOND TYPE=command MSG="action:prompt_begin Impressao Pausada"
    RESPOND TYPE=command MSG="action:prompt_text Bico no park — X10 Y220."
    RESPOND TYPE=command MSG="action:prompt_text "
    RESPOND TYPE=command MSG="action:prompt_text O que pretendes fazer?"
    RESPOND TYPE=command MSG="action:prompt_footer_button Retomar|RESUME|primary"
    RESPOND TYPE=command MSG="action:prompt_footer_button Cancelar|CANCEL_PRINT|error"
    RESPOND TYPE=command MSG="action:prompt_show"


[gcode_macro RESUME]
description: Retoma a impressão restaurando a temperatura e purgando o bico
rename_existing: BASE_RESUME
variable_zhop: 0
variable_etemp: 0
gcode:
    {% if printer['pause_resume'].is_paused|int == 1 %}
        UPDATE_DELAYED_GCODE ID=COOLDOWN_PAUSE DURATION=0		# Cancela o temporizador de cooldown caso o utilizador retome antes dos 2 minutos
        
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}		# Restaura o timeout original do teu ficheiro de configuração
        
           {% if etemp > 0 %}        # --- Recuperação da Temperatura ---
            M118 A aquecer para {etemp}C...
            M109 S{etemp|int}                                    ; espera atingir a temperatura original
        {% endif %}
        
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=100	      # Garante que estamos na posição de Park para fazer a purga
        
        # --- Preparação do Filamento (Purga e Retração no Park) ---
        G91                                                                     ; posicionamento relativo
        M83                                                                     ; extrusor relativo
        
        M118 A purgar 5mm de filamento...
        G1 E10 F200                                                              ; extrude 5mm lentamente para purgar (firme)
        G4 P2000                                                                ; espera 2 segundos para estabilizar a pressão
        
              
        # --- Retorno à Impressão ---
        # Desce o eixo Z de volta
        G1 Z{zhop * -1} F900                                                    
        G90                                                                     ; posicionamento absoluto
        
        # Restaura a posição exata onde a impressão parou
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=100 
        G1 E0.5 F800                    
        BASE_RESUME                                                             ; retoma a impressão nativa
    {% endif %}


  
# ====================================================================
# CANCELAR
# ====================================================================  
  
[gcode_macro CANCEL_PRINT]
description: Cancela a impressao atual, limpa estados e afasta os eixos
rename_existing: CANCEL_PRINT_BASE
gcode:
    CLEAR_PAUSE
    CANCEL_PRINT_BASE
    SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}
    PRINT_END
    M117 IMPRESSAO CANCELADA
  
  
# ====================================================================
# SET PAUSE NEXT LAYER
# ==================================================================== 
  
# Usage: SET_PAUSE_NEXT_LAYER [ENABLE=[0 | 1]] [MACRO=<name>]
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Enable a pause if the next layer is reached
gcode:
  {% set pause_next_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_next_layer %}
  {% set ENABLE = params.ENABLE | default(1) | int != 0 %}
  {% set MACRO = params.MACRO | default(pause_next_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

  
# Usage: SET_PAUSE_AT_LAYER [ENABLE=[0 | 1]] [LAYER=<number>] [MACRO=<name>]
[gcode_macro SET_PAUSE_AT_LAYER]
description: Enable/disable a pause if a given layer number is reached
gcode:
  {% set pause_at_layer = printer['gcode_macro SET_PRINT_STATS_INFO'].pause_at_layer %}
  {% set ENABLE = params.ENABLE | int != 0 if params.ENABLE is defined
             else params.LAYER is defined %}
  {% set LAYER = params.LAYER | default(pause_at_layer.layer) | int %}
  {% set MACRO = params.MACRO | default(pause_at_layer.call, True) %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"


  
# Usage: SET_PRINT_STATS_INFO [TOTAL_LAYER=<total_layer_count>] [CURRENT_LAYER= <current_layer>]
[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Overwrite, to get pause_next_layer and pause_at_layer feature
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_next_layer" % pause_next_layer.call}'
    {pause_next_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG='{"%s, forced by pause_at_layer [%d]" % (pause_at_layer.call, pause_at_layer.layer)}'
    {pause_at_layer.call} ; execute the given gcode to pause, should be either M600 or PAUSE
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}

  
 
# ====================================================================
# TOOLHEAD PARK PAUSE CANCEL
# ====================================================================  

[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Helper: park toolhead used in PAUSE and CANCEL_PRINT
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
  {% set use_custom     = client.use_custom_pos | default(false) | lower == 'true' %}
  {% set custom_park_x  = client.custom_park_x | default(0.0) %}
  {% set custom_park_y  = client.custom_park_y | default(0.0) %}
  {% set park_dz        = client.custom_park_dz | default(2.0) | abs %}
  {% set sp_hop         = client.speed_hop | default(15) * 60 %}
  {% set sp_move        = client.speed_move | default(velocity) * 60 %}
  ##### get config and toolhead values #####
  {% set origin    = printer.gcode_move.homing_origin %}
  {% set act       = printer.gcode_move.gcode_position %}
  {% set max       = printer.toolhead.axis_maximum %}
  {% set cone      = printer.toolhead.cone_start_z | default(max.z) %} ; height as long the toolhead can reach max and min of an delta
  {% set round_bed = True if printer.configfile.settings.printer.kinematics is in ['delta','polar','rotary_delta','winch']
                else False %}
  ##### define park position #####
  {% set z_min = params.Z_MIN | default(0) | float %}
  {% set z_park = [[(act.z + park_dz), z_min] | max, (max.z - origin.z)] | min %}
  {% set x_park = params.X       if params.X is defined
             else custom_park_x  if use_custom
             else 0.0            if round_bed
             else (max.x - 5.0) %}
  {% set y_park = params.Y       if params.Y is defined
             else custom_park_y  if use_custom
             else (max.y - 5.0)  if round_bed and z_park < cone
             else 0.0            if round_bed
             else (max.y - 5.0) %}
  ##### end of definitions #####
  _CLIENT_RETRACT
  {% if "xyz" in printer.toolhead.homed_axes %}
    G90
    G1 Z{z_park} F{sp_hop}
    G1 X{x_park} Y{y_park} F{sp_move}
    {% if not printer.gcode_move.absolute_coordinates %} G91 {% endif %}
  {% else %}
    RESPOND TYPE=echo MSG='Printer not homed'
  {% endif %}	  
	  
	  
# ====================================================================
# PURGA NO AR
# ====================================================================
[gcode_macro PURGAR_FILAMENTO_NO_AR]
description: Eleva a cabeca 5cm e purga filamento no ar
variable_temperatura    : 220
variable_comprimento_mm : 50
gcode:
  {% set TEMP       = params.TEMPERATURA    | default(temperatura)    | float %}
  {% set COMPRIMENTO = params.COMPRIMENTO_MM | default(comprimento_mm) | float %}
  RESPOND MSG="A subir e aquecer para purga..."
  CHOME
  G90
  G1 Z50 F900
  G1 X110 Y110 F12000
  RESPOND MSG="A aquecer bico..."
  M117 A aquecer bico...
  M109 S{TEMP}
  RESPOND MSG="A purgar {COMPRIMENTO}mm..."
  M83
  G1 E{COMPRIMENTO} F150
  G4 P1000
  G1 E-2 F1200
  M82
  RESPOND MSG="Purga concluida!"

# ====================================================================
# PURGA NO AR EM PAUSA
# ====================================================================  
  
[gcode_macro PURGA_PAUSA]
description: Purga filamento na posicao de park (so usar com impressao pausada)
gcode:
  {% if printer.pause_resume.is_paused %}
    {% set COMP = params.MM | default(30) | float %}
    M83
    G1 E{COMP} F200    ; purga lenta no park
    G1 E-2 F1200       ; retract anti-fio
    M82
    RESPOND MSG="Purga de {COMP | int}mm concluida no park."
  {% else %}
    RESPOND MSG="ERRO: so usar com impressao pausada!"
  {% endif %} 
  
  
  
  
  
# ====================================================================
# PID EXTRUDER / PID BED
# ====================================================================	  

[gcode_macro PID_EXTRUDER]
description: Calibracao PID do bico (Ex: PID_EXTRUDER TARGET=220)
gcode:
  {% set target = params.TARGET | default(220) | float %}
  RESPOND MSG="PID do bico a {target | int}C..."
  PID_CALIBRATE HEATER=extruder TARGET={target}
  SAVE_CONFIG

[gcode_macro PID_BED]
description: Calibracao PID da mesa (Ex: PID_BED TARGET=60)
gcode:
  {% set target = params.TARGET | default(60) | float %}
  RESPOND MSG="PID da mesa a {target | int}C..."
  PID_CALIBRATE HEATER=heater_bed TARGET={target}
  SAVE_CONFIG

  
# ====================================================================
# CALIBRAÇÃO Z-OFFSET E BABYSTEPPING
# ====================================================================
[gcode_macro CALIBRAR_Z_OFFSET]
description: Calibracao automatica do Z-Offset via PRTouch
gcode:
  RESPOND MSG="Home em progresso..."
  CHOME
  RESPOND MSG="A calibrar Z-Offset via PRTouch..."
  PRTOUCH_PROBE_ZOFFSET
  RESPOND MSG="Calibracao concluida! A gravar..."
  SAVE_CONFIG


[gcode_macro GRAVAR_Z_OFFSET]
description: Grava o ajuste fino de babystepping feito na primeira camada
gcode:
  RESPOND MSG="A aplicar e gravar Z-Offset ajustado..."
  Z_OFFSET_APPLY_PROBE
  G4 P500
  RESPOND MSG="Z-Offset gravado! A reiniciar..."
  SAVE_CONFIG  
  
# ====================================================================
# BACKUP / RESTAURO VIA GITHUB
# ====================================================================
[gcode_shell_command backup_cfg]
command: /home/klipper/printer_data/config/autocommit.sh
timeout: 30.0
verbose: True

[gcode_macro BACKUP_GITHUB]
description: Envia configuracoes para o GitHub privado
gcode:
  RESPOND MSG="A enviar configuracoes para o GitHub..."
  RUN_SHELL_COMMAND CMD=backup_cfg

[gcode_shell_command restaurar_cfg]
command: /home/klipper/printer_data/config/restore.sh
timeout: 30.0
verbose: True

[gcode_macro RESTAURAR_GITHUB]
description: Restaura configuracoes a partir do GitHub
gcode:
  RESPOND MSG="ATENCAO: A restaurar configuracoes do GitHub..."
  RUN_SHELL_COMMAND CMD=restaurar_cfg
  G4 P2000
  RESPOND MSG="Restauro concluido! A reiniciar..."
  SAVE_CONFIG  

  
# ====================================================================
# GESTÃO DE FILAMENTO
# ====================================================================  

[gcode_macro FILAMENT_LOAD]
gcode:
    {% set load = params.L|default(100)|float * 0.5 %}
    {% set extruder_temp = params.T|default(240)|float %}
    SAVE_GCODE_STATE NAME=FILAMENT_LOAD_STATE
    LOW_TEMP_CHECK T={extruder_temp}
    M118 Loading filament
    M83                                                                         # relative extrusion
    G1 E{load} F1500                                                            # extrude fast
    G4 P1000                                                                    # wait 1 second
    G1 E{load} F200                                                             # extrude slow
    RESTORE_GCODE_STATE NAME=FILAMENT_LOAD_STATE
    BEEP


[gcode_macro FILAMENT_UNLOAD]
gcode:
    {% set unload = params.U|default(100)|float %}
    {% set extruder_temp = params.T|default(240)|float %}
    SAVE_GCODE_STATE NAME=FILAMENT_UNLOAD_STATE
    LOW_TEMP_CHECK T={extruder_temp}
    M118 Unloading filament
    M83                                                                         # relative extrusion
    G1 E2  F200                                                                 # extrude a little
    G1 E-10  F200                                                               # retract a little
    G1 E-{unload} F1500                                                         # retract a lot
    RESTORE_GCODE_STATE NAME=FILAMENT_UNLOAD_STATE

[gcode_macro LOW_TEMP_CHECK]
gcode:
    {% set extruder_temp = params.T|default(200)|float %}
    {% if printer.extruder.target > extruder_temp %}                            # if there is a setpoint for extruder
        {% set extruder_temp = printer.extruder.target %}
    {% endif %}
    {% if printer.extruder.temperature < extruder_temp %}                       # heat to the target
        M118 Heating to {extruder_temp}
        SET_HEATER_TEMPERATURE HEATER=extruder TARGET={extruder_temp}
        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={extruder_temp}
    {% endif %}


[delayed_gcode COOLDOWN_PAUSE]
gcode:
    # Verifica se a impressora ainda está pausada antes de baixar a temperatura
    {% if printer['pause_resume'].is_paused|int == 1 %}
        M118 Passaram 2 minutos. A baixar hotend para 150C...
        M104 S150
    {% endif %}


[gcode_macro _CLIENT_EXTRUDE]
description: Extrudes, if the extruder is hot enough
gcode:
  ##### get user parameters or use default #####
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set use_fw_retract = (client.use_fw_retract | default(false) | lower == 'true') and (printer.firmware_retraction is defined) %}
  {% set length = params.LENGTH | default(client.unretract) | default(1.0) | float %}
  {% set speed = params.SPEED | default(client.speed_unretract) | default(35) %}
  {% set absolute_extrude = printer.gcode_move.absolute_extrude %}
  ##### end of definitions #####
  {% if printer.toolhead.extruder != '' %}
    {% if printer[printer.toolhead.extruder].can_extrude %}
      {% if use_fw_retract %}
        {% if length < 0 %}
          G10
        {% else %}
          G11
        {% endif %}
      {% else %}
        M83
        G1 E{length} F{(speed | float | abs) * 60}
        {% if absolute_extrude %}
          M82
        {% endif %}
      {% endif %}
    {% else %}
      RESPOND TYPE=echo MSG='Extruder not hot enough'
    {% endif %}
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Retracts, if the extruder is hot enough
gcode:
  {% set client = printer['gcode_macro _CLIENT_VARIABLE'] | default({}) %}
  {% set length = params.LENGTH | default(client.retract) | default(1.0) | float %}
  {% set speed = params.SPEED | default(client.speed_retract) | default(35) %}

  _CLIENT_EXTRUDE LENGTH=-{length | float | abs} SPEED={speed | float | abs}


  


 
# ====================================================================
# BEEP
# ====================================================================   
[gcode_macro BEEP]
description: Bip sonoro (se buzzer configurado)
gcode:
  {% set duration = params.P | default(100) | float %}
  {% if 'output_pin beeper' in printer %}
    SET_PIN PIN=beeper VALUE=1
    G4 P{duration}
    SET_PIN PIN=beeper VALUE=0
  {% else %}
    RESPOND MSG="BEEP (buzzer nao mapeado)."
  {% endif %}  


# ====================================================================
# OFF - POWER OFF
# ====================================================================
  
[gcode_macro OFF]
description: Desliga motores, aquecedores e ventoinha
gcode:
  M84
  TURN_OFF_HEATERS
  M107

[gcode_macro POWER_OFF_PRINTER]
description: Alias de OFF para compatibilidade com idle_timeout
gcode:
  OFF  
  

# ====================================================================
# SOBREPOSIÇÃO M109 / M190 (NAO BLOQUEANTES)
# ====================================================================
[gcode_macro M109]
rename_existing: M99109
description: Aguarda temperatura do bico sem estabilizacao extra
gcode:
  {% set s = params.S | default(0) | float %}
  M99109 {rawparams}
  {% if s > 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
  {% endif %}

[gcode_macro M190]
rename_existing: M99190
description: Aguarda temperatura da mesa sem estabilizacao extra
gcode:
  {% set s = params.S | default(0) | float %}
  M99190 {rawparams}
  {% if s > 0 %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}
  {% endif %}
  
  

  
  
  
  
