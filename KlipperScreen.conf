[main]
# Ativa a seta do rato para portáteis sem ecrã tátil
show_cursor = True

# Define o idioma para português
language = pt_PT

# Tema padrão e tempo para o ecrã apagar (150 segundos = 2.5 minutos)
theme = default
screen_blanking = 150

[printer Ender3V3SE]
# Liga o ecrã diretamente ao Klipper do Asus
moonraker_host = 127.0.0.1
moonraker_port = 7125

[preheat PLA]
extruder = 210
heater_bed = 60

[preheat PETG]
extruder = 240
heater_bed = 80

[displayed_macros Ender3V3SE]
# Esconde sub-macros internas para o menu não ficar cheio de lixo
_TOOLHEAD_PARK_PAUSE_CANCEL = False
_CLIENT_RETRACT = False
_CLIENT_EXTRUDE = False

