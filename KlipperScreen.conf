[main]
# Ativa a seta do rato para portáteis sem ecrã tátil
show_cursor = True

# tempo para o ecrã apagar (150 segundos = 2.5 minutos)
screen_blanking = 150

[printer Ender3V3SE]
# Liga o ecrã diretamente ao Klipper do Asus
moonraker_host = 127.0.0.1
moonraker_port = 7125
