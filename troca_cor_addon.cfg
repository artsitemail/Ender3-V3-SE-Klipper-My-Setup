# ====================================================================
# ADDON — TROCA DE COR AUTOMÁTICA COM POPUP NO KLIPPERSCREEN
# ====================================================================
#
# INSTALAÇÃO:
#   1. Copia "cache_cores.sh" para:
#      /home/klipper/printer_data/config/scripts/cache_cores.sh
#      (cria a pasta "scripts" se não existir)
#      chmod +x /home/klipper/printer_data/config/scripts/cache_cores.sh
#
#   2. Adiciona ao printer.cfg:
#      [include troca_cor_addon.cfg]
#
#   3. Em OrcaSlicer → Printer Settings → Machine G-code
#      → "Change filament G-code":
#      Substitui o que está por:   TROCA_COR EXTRUSOR={next_extruder}
#
#   4. Adiciona ao teu PRINT_START, após M190 (mesa quente):
#      CACHE_CORES
#      G4 P3000    ; Aguarda o script ler as cores do ficheiro
#
# RESULTADO:
#   - As cores são lidas automaticamente do gcode em cada impressão
#   - Nenhuma configuração por impressão necessária
#   - O popup mostra o nome real da cor (ex: "PLA Vermelho")
#   - O ecrã físico da Ender 3 V3 SE mostra M117 em simultâneo
# ====================================================================


# ====================================================================
# PLACEHOLDERS T0–T9
# Obrigatório — o OrcaSlicer insere Tn no gcode; sem estas macros o
# Klipper daria erro de extrusor desconhecido. A lógica de troca está
# toda no TROCA_COR chamado pelo "Change filament G-code" do OrcaSlicer.
# ====================================================================
[gcode_macro T0]
gcode:

[gcode_macro T1]
gcode:

[gcode_macro T2]
gcode:

[gcode_macro T3]
gcode:

[gcode_macro T4]
gcode:

[gcode_macro T5]
gcode:

[gcode_macro T6]
gcode:

[gcode_macro T7]
gcode:

[gcode_macro T8]
gcode:

[gcode_macro T9]
gcode:


# ====================================================================
# COMANDO SHELL — chama o script que lê as cores do gcode
# ====================================================================
[gcode_shell_command get_cores_cmd]
command: sh /home/klipper/printer_data/config/scripts/cache_cores.sh
timeout: 10.0
verbose: False


# ====================================================================
# ARMAZENAMENTO INTERNO DAS CORES
# Esta macro recebe o resultado do script shell e guarda a lista.
# Não chamar diretamente — é chamada pelo script via Moonraker API.
# ====================================================================
[gcode_macro _SET_CORES]
description: Recebe e guarda a lista de cores (chamado pelo cache_cores.sh)
variable_lista: ""
gcode:
    {% set c = params.CORES | default("") %}
    SET_GCODE_VARIABLE MACRO=_SET_CORES VARIABLE=lista VALUE='"{c}"'
    RESPOND MSG="Cores em cache: {c}"


# ====================================================================
# CACHE_CORES — Ler as cores do ficheiro atual e guardar
# Adicionar ao PRINT_START logo após M190, seguido de G4 P3000
# ====================================================================
[gcode_macro CACHE_CORES]
description: Le as cores do gcode em impressao e guarda para TROCA_COR
gcode:
    {% set fp = printer.virtual_sdcard.file_path %}
    {% if fp %}
        RESPOND MSG="A ler cores do ficheiro: {fp}"
        RUN_SHELL_COMMAND CMD=get_cores_cmd PARAMS='"{fp}"'
    {% else %}
        RESPOND MSG="CACHE_CORES: ficheiro nao encontrado no virtual_sdcard."
    {% endif %}


# ====================================================================
# TROCA_COR — Macro principal de troca de filamento
#
# Chamado pelo OrcaSlicer via "Change filament G-code":
#   TROCA_COR EXTRUSOR={next_extruder}
#
# O que faz:
#   1. Lê o nome da cor para este extrusor da cache
#   2. Pausa a impressão (PAUSE_BASE)
#   3. Retrai 5mm e sobe Z em segurança (max_z protegido)
#   4. Move para X10 Y10 (esquerda + trás — fácil acesso ao filamento)
#   5. Mostra popup no KlipperScreen com a cor a colocar + botão Retomar
#   6. Mostra M117 no ecrã físico original da Ender 3 V3 SE
#
# O RESUME (ao clicar no popup ou no ecrã):
#   - Reaquece o bico se arrefeceu durante a pausa
#   - Desretrai 1mm
#   - Retoma a impressão
# ====================================================================
[gcode_macro TROCA_COR]
description: Pausa multicolor com popup no KlipperScreen (cor lida do gcode)
gcode:
    {% set ext = params.EXTRUSOR | default(0) | int %}

    # Lê a lista de cores guardada pelo CACHE_CORES
    {% set lista = printer['gcode_macro _SET_CORES'].lista %}
    {% set cores = lista.split(',') %}
    {% set cor = cores[ext].strip() if ext < cores | length and cores[ext].strip() != "" 
                 else "Filamento " ~ (ext + 1) %}

    # Guarda temperatura para o RESUME restaurar corretamente
    SET_GCODE_VARIABLE MACRO=PAUSE VARIABLE=last_extruder_temp VALUE={printer.extruder.target}
    PAUSE_BASE

    {% if "xyz" in printer.toolhead.homed_axes %}

        # Retração suave e Z seguro anti-colisão com a peça
        _CLIENT_RETRACT LENGTH=5.0
        {% set cur_z  = printer.toolhead.position.z %}
        {% set max_z  = printer.toolhead.axis_maximum.z %}
        {% set safe_z = [cur_z + 20.0, max_z - 2.0] | min %}
        G90
        G1 Z{safe_z} F900
        G1 X10 Y10 F12000           ; Esquerda + trás — acesso fácil ao extrusor

        BEEP P=400

        # Mensagem no ecrã físico original da Ender 3 V3 SE (jpcurti)
        M117 Coloque: {cor}

        # Popup modal no KlipperScreen
        # Mostra a cor a colocar e um botão Retomar na parte inferior
        RESPOND TYPE=command MSG="action:prompt_begin Troca de Filamento"
        RESPOND TYPE=command MSG="action:prompt_text Extrusor T{ext} — retire o filamento atual."
        RESPOND TYPE=command MSG="action:prompt_text "
        RESPOND TYPE=command MSG="action:prompt_text Coloque:"
        RESPOND TYPE=command MSG="action:prompt_text "
        RESPOND TYPE=command MSG="action:prompt_text         {cor}"
        RESPOND TYPE=command MSG="action:prompt_text "
        RESPOND TYPE=command MSG="action:prompt_text Depois carregue em Retomar."
        RESPOND TYPE=command MSG="action:prompt_footer_button Retomar impressao|RESUME|primary"
        RESPOND TYPE=command MSG="action:prompt_show"

        RESPOND MSG="Troca de filamento T{ext}: coloque [{cor}] e carregue Resume."

    {% else %}
        RESPOND MSG="Erro: a impressora nao fez Homing. Faz G28 primeiro."
    {% endif %}
