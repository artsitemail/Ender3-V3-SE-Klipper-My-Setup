[include fluidd.cfg]

[include macro.cfg]

[exclude_object]

[gcode_macro _KAMP_Settings]
description: Ativa o nivelamento adaptativo nativo do Klipper
gcode:
# Deixar este bloco vazio ativa as definições padrão do KAMP

[printer]
kinematics: cartesian
max_velocity: 270
max_accel: 2500
#max_accel_to_decel: 2500
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 150

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -11
position_min: -15
position_max: 230
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -14
position_min: -14
position_max: 230
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 250
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 2.0

[extruder]
max_extrude_only_distance: 100.0
pressure_advance: 0.0715
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.58637
nozzle_diameter: 0.400
max_extrude_cross_section: 5.0
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
#control: pid
# tuned for stock hardware with 200 degree Celsius target
#pid_Kp: 27.142
#pid_Ki: 1.371
#pid_Kd: 134.351
min_temp: 0
max_temp: 300
min_extrude_temp: 170

[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
# tuned for stock hardware with 70 degree Celsius target
#pid_kp: 66.371
#pid_ki: 0.846
#pid_kd: 1301.702
min_temp: 0
max_temp: 100

[heater_fan hotend_fan]
pin: PC1
max_power: 1.0
shutdown_speed : 0
cycle_time: 0.010
hardware_pwm: false
kick_start_time: 0.100
off_below: 0.0
heater:extruder
heater_temp : 50
fan_speed : 1.0

[fan]
pin: PA0

[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -24.0
y_offset: -20
#z_offset: 1.96            ; O seu Z-Offset real
speed: 10
lift_speed: 20
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True
samples: 4                ; Alvo de 6 amostras
samples_result: median    ; Extrai a mediana perfeita das 6
samples_tolerance: 0.015
samples_tolerance_retries: 0 ; FORÇA a impressora a fazer as 6 amostras completas sempre!

[safe_z_home]
home_xy_position: 134,130
speed: 100
z_hop: 10
z_hop_speed: 20

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 5,10         # Need to handle head distance with cr-touch (bl_touch)
mesh_max: 190,200      # Max probe range
probe_count: 5,5
algorithm: bicubic

[output_pin beeper]
pin: PB0

[tmc2208 stepper_x]
uart_pin: PB12
run_current: 0.60
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[tmc2208 stepper_y]
uart_pin: PB13
run_current: 0.60
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[tmc2208 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
stealthchop_threshold: 0
interpolate: false

[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Host]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[pause_resume]
recover_velocity: 25

# ====================================================================
# CONFIGURAÇÕES OBRIGATÓRIAS PARA AS ESTATÍSTICAS DO ECRÃ
# ====================================================================

[display_status]

[print_stats]

[e3v3se_display]
language: portuguese
logging: False

[respond]

[delayed_gcode DELAYED_PRINTER_OFF]
initial_duration = 0.
gcode =
  {% if printer.idle_timeout.state == "Idle" %}
    {% if printer["extruder"].temperature > 50 %}
      UPDATE_DELAYED_GCODE ID=DELAYED_PRINTER_OFF DURATION=60
    {% else %}
#      WLED_OFF STRIP=roof
      POWER_OFF_PRINTER
    {% endif %}
  {% else %}
    M118 Printer not idle, cancelled PRINTER_OFF.
  {% endif %}

[idle_timeout]
gcode:
  M84
  TURN_OFF_HEATERS
  UPDATE_DELAYED_GCODE ID=DELAYED_PRINTER_OFF DURATION=60

# ====================================================================
# MACRO PARA CALIBRAÇÃO DO Z-OFFSET 100% AUTOMÁTICO
# ====================================================================

[gcode_macro CALIBRAR_Z_OFFSET]
description: Executa o alinhamento e cálculo automático do Z-Offset
gcode:
    # 1. Faz o Home completo em segurança
    CHOME
    
    # 2. Executa a rotina do sensor de força (Prtouch)
    RESPOND MSG="A iniciar calibração automática do Z-Offset..."
    PRTOUCH_PROBE_ZOFFSET
    
    # 3. Guarda permanentemente as definições no ficheiro e reinicia
    RESPOND MSG="Calibração concluída! A guardar dados..."
    SAVE_CONFIG
 
  
# ====================================================================
# SENSORES DE PESO DEBAIXO DA MESA (PLACA C13)
# ====================================================================
[filter]

[dirzctl]

[hx711s]
sensor0_clk_pin: PA4             # Pressure detection clock pin
sensor0_sdo_pin: PC6             # Pressure detection data pin

[prtouch]
sensor_x: 32
sensor_y: 30
clr_noz_start_x: 15
clr_noz_start_y: 25
clr_noz_len_y: 15
s_hot_min_temp: 160
s_hot_max_temp: 200
s_bed_max_temp: 60
show_msg: True
wipe_retract_distance: 2

