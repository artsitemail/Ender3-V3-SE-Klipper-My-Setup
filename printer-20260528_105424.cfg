[include fluidd.cfg]
[include macros.cfg]

[exclude_object]

[gcode_macro _KAMP_Settings]
description: Ativa o nivelamento adaptativo nativo do Klipper
gcode:
    # Deixar este bloco vazio ativa as definições padrão do KAMP

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 2500
max_z_velocity: 5
square_corner_velocity: 5.0
max_z_accel: 100

[stepper_x]
step_pin: PC2
dir_pin: !PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA5
position_endstop: -6
position_min: -6
position_max: 230
homing_speed: 50

[tmc2208 stepper_x]
uart_pin: PB12
run_current: 0.60
sense_resistor: 0.150
interpolate: True

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: !PA6
position_endstop: -14
position_min: -14
position_max: 230
homing_speed: 50

[tmc2208 stepper_y]
uart_pin: PB13
run_current: 0.60
sense_resistor: 0.150
interpolate: True

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -3
position_max: 250
homing_speed: 4
second_homing_speed: 1
homing_retract_dist: 2.0

[tmc2208 stepper_z]
uart_pin: PB14
run_current: 0.8
sense_resistor: 0.150
interpolate: True

[bltouch]
sensor_pin: ^PC14
control_pin: PC13
x_offset: -23.0
y_offset: -14.5
z_offset: 0
speed: 20
pin_move_time: 0.4
stow_on_each_sample: False
probe_with_touch_mode: True

[safe_z_home]
home_xy_position: 134,123
speed: 120
z_hop: 10
z_hop_speed: 10

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 30,30
mesh_max: 207,215.5
probe_count: 5,5
algorithm: bicubic

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
rotation_distance: 7.44
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: Generic 3950
sensor_pin: PC5
control: pid
pid_Kp: 27.142
pid_Ki: 1.371
pid_Kd: 134.351
min_temp: 0
max_temp: 300
min_extrude_temp: 170

[heater_bed]
heater_pin: PB2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_kp: 66.371
#pid_ki: 0.846
#pid_kd: 1301.702
min_temp: 0
max_temp: 100

[fan]
pin: PA0

[heater_fan hotend_fan]
pin: PC1
heater: extruder
heater_temp: 50.0

[output_pin beeper]
pin: PB0

[e3v3se_display]
language: portuguese
logging: False


# ====================================================================
# CONFIGURAÇÕES OBRIGATÓRIAS PARA AS ESTATÍSTICAS DO ECRÃ
# ====================================================================

[print_stats]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# ====================================================================
# MACRO PARA CALIBRAÇÃO DO Z-OFFSET 100% AUTOMÁTICO
# ====================================================================

[gcode_macro CALIBRAR_Z_OFFSET]
description: Executa o alinhamento e cálculo automático do Z-Offset
gcode:
    # 1. Faz o Home completo em segurança
    CHOME
    
    # 2. Executa a rotina do sensor de força (Prtouch)
    RESPOND MSG="A iniciar calibração automática do Z-Offset..."
    PRTOUCH_PROBE_ZOFFSET
    
    # 3. Guarda permanentemente as definições no ficheiro e reinicia
    RESPOND MSG="Calibração concluída! A guardar dados..."
    SAVE_CONFIG

[gcode_macro CHOME]
description: Faz o Home apenas se os eixos já não estiverem posicionados
gcode:
    {% if printer.toolhead.homed_axes != "xyz" %}
        G28
    {% endif %}

[gcode_macro PAUSE]
description: Pausa a impressão atual
rename_existing: BASE_PAUSE
gcode:
    {% set X = params.X|default(0)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    {% set E = params.E|default(1)|float %}
    SAVE_GCODE_STATE NAME=PAUSE_state
    BASE_PAUSE
    G91
    G1 E-{E} F2100
    G1 Z{Z} F900
    G90
    G1 X{X} Y{Y} F6000

