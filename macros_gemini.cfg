 ====================================================================
# SUPORTE DE SISTEMA (OBRIGATÓRIO PARA AS INTERFACES E ECRÃ)
# ====================================================================
[pause_resume]
[display_status]
[respond]

# ====================================================================
# VARIÁVEIS DO CLIENTE FLUIDD/MAINSAIL (PRESERVAÇÃO DE COMPATIBILIDADE)
# ====================================================================
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True
variable_custom_park_x    : 10.0
variable_custom_park_y    : 220.0
variable_custom_park_dz   : 5.0
gcode:
  RESPOND MSG="Variaveis do ecossistema carregadas com sucesso."

# ====================================================================
# CHOME - HOMING CONDICIONAL (OTIMIZAÇÃO DE TEMPO)
# ====================================================================
[gcode_macro CHOME]
description: Faz o Home apenas se os eixos nao estiverem posicionados
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
  {% endif %}

# ====================================================================
# CALIBRAÇÃO AUTOMÁTICA DO CR-TOUCH / PRTOUCH (ENDER 3 V3 SE)
# ====================================================================
[gcode_macro CALIBRAR_Z_OFFSET]
description: Executa o alinhamento e calculo automatico do Z-Offset via PRTouch
gcode:
  M117 Fazendo Home...
  CHOME
  M117 Calibrando Z...
  RESPOND MSG="A iniciar calibracao automatica do Z-Offset (PRTouch)..."
  PRTOUCH_PROBE_ZOFFSET
  M117 Guardando...
  RESPOND MSG="Calibracao concluida! A gravar configuracoes..."
  SAVE_CONFIG

[gcode_macro GRAVAR_Z_OFFSET]
description: Aplica o ajuste fino (Babystepping) feito durante a impressao
gcode:
  M117 Gravando Z...
  RESPOND MSG="A aplicar ajuste fino do Z-Offset no sensor Probe..."
  Z_OFFSET_APPLY_PROBE
  G4 P500
  RESPOND MSG="Z-Offset atualizado! A reiniciar o Klipper..."
  M117 Reiniciando...
  SAVE_CONFIG

# ====================================================================
# MACROS DE INÍCIO E FIM DE IMPRESSÃO (INTEGRAÇÃO KAMP)
# ====================================================================
[gcode_macro PRINT_START]
description: Prepara a impressora, executa o Mesh Adaptativo e a Purga
gcode:
  {% set bed_temp = params.BED | default(60) | float %}
  {% set extruder_temp = params.EXTRUDER | default(220) | float %}
  
  CLEAR_PAUSE
  
  M140 S{bed_temp}        ; Aquecimento em background da mesa
  M104 S150               ; Pré-aquecimento seguro do bico (evita babar)
  
  M190 S{bed_temp}        ; Aguarda temperatura estável da mesa
  CHOME                   ; Homing condicional seguro
  
  M104 S{extruder_temp}   ; Dispara bico para temperatura de fusão
  M117 Criando Mesh...
  RESPOND MSG="KAMP: A executar nivelamento adaptativo da mesa..."
  BED_MESH_CALIBRATE ADAPTIVE=1 ADAPTIVE_MARGIN=5
  
  G0 X1 Y1 Z2 F12000      ; Posição de espera rápida no canto frontal esquerdo
  M109 S{extruder_temp}   ; Aguarda bico atingir alvo de impressão
  
  M117 Purgando...
  ADAPTIVE_LINE_PURGE     ; Executa a purga inteligente junto à peça
  M117 Imprimindo...

[gcode_macro PRINT_END]
description: Finaliza a impressao e afasta os eixos em seguranca
gcode:
  G91                               ; Posicionamento relativo
  G1 E-2 F2700                      ; Retração inicial de 2mm
  G1 E-2 Z0.2 F2400                 ; Retração secundária com pequeno salto Z
  G0 X5 Y5 F3000                    ; Afastamento rápido anti-fios
  G0 Z10 F900                       ; Eleva Z 10mm acima da peça
  G90                               ; Retorna ao posicionamento absoluto
  G0 X10 Y220 F12000                ; Bico à esquerda (X10) e apresenta a mesa à frente (Y220)
  M106 S0                           ; Desliga ventoinha da peça
  TURN_OFF_HEATERS                  ; Desliga bico e mesa de forma segura
  M117 Concluido!
  M84                               ; Desativa motores de passo

# ====================================================================
# MACROS DE CONTROLO DE IMPRESSÃO (CANCELAR / PAUSAR / RETOMAR)
# ====================================================================
[gcode_macro CANCEL_PRINT]
description: Cancela a impressao atual de forma limpa e suave
rename_existing: CANCEL_PRINT_BASE
gcode:
  CANCEL_PRINT_BASE
  TURN_OFF_HEATERS
  M106 S0
  SET_PAUSE_NEXT_LAYER ENABLE=0
  SET_PAUSE_AT_LAYER ENABLE=0 LAYER=0
  G91               
  G1 Z10 F900                       ; Sobe Z 10mm suavemente
  G90               
  G1 X10 Y220 F6000                 ; Bico à esquerda e avança a mesa de forma mais suave (F6000)
  M117 Cancelado!
  M84


[gcode_macro PAUSE]
description: Pausa a impressao e chega a mesa para a frente
rename_existing: PAUSE_BASE
gcode:
  PAUSE_BASE
  {% if "xyz" in printer.toolhead.homed_axes %}
    _CLIENT_RETRACT LENGTH=4.0       ; Puxa o filamento suavemente 4mm
    G91                              ; Modo relativo
    G1 Z5 F900                       ; Salto Z de segurança
    G90                              ; Modo absoluto
    G1 X10 Y220 F12000               ; Bico à esquerda e mesa PARA A FRENTE
    M117 Pausado!
    RESPOND MSG="Impressora pausada. Mesa a frente (Y220)."
  {% else %}
    RESPOND MSG="Erro: Impressora nao fez Homing!"
  {% endif %}


# ====================================================================
# M600 - TROCA DE FILAMENTO (MESA TOTALMENTE PARA TRÁS)
# ====================================================================
[gcode_macro M600]
description: Troca de filamento com a mesa para tras
gcode:
  M117 Troque o Rolo!
  RESPOND MSG="Mudanca de cor: A preparar filamento e a afastar a mesa..."
  PAUSE_BASE
  {% if "xyz" in printer.toolhead.homed_axes %}
    _CLIENT_RETRACT LENGTH=4.0       ; Puxa o filamento suavemente 4mm
    G91 
    G1 Z5 F900 
    G90 
    G1 X10 Y10 F12000                ; Bico à esquerda e mesa PARA TRÁS
    RESPOND MSG="Aguardando novo filamento. Mesa para tras (Y10)."
  {% endif %}

# ====================================================================
# HELPERS INTERNOS DE MOVIMENTO E ESTACIONAMENTO
# ====================================================================
[gcode_macro _TOOLHEAD_PARK_PAUSE_CANCEL]
description: Auxiliar de posicionamento para Pausa (Bico à esquerda, mesa para trás)
gcode:
  {% if "xyz" in printer.toolhead.homed_axes %}
    _CLIENT_RETRACT LENGTH=4.0       ; Puxa 4mm suave para modelar a ponta do filamento
    G91                              ; Modo relativo para Z-Hop
    G1 Z5 F900                       ; Salto de segurança de 5mm em Z
    G90                              ; Modo absoluto
    G1 X10 Y220 F12000               ; Bico à esquerda (X10) e mesa TOTALMENTE PARA TRÁS (Y220)
    M117 Pausado!
    RESPOND MSG="Impressora pausada em X10 Y220. Aguardando comando..."
  {% else %}
    RESPOND MSG="Erro: Impressora nao fez Homing!"
  {% endif %}

[gcode_macro _CLIENT_EXTRUDE]
description: Auxiliar de extrusao controlada
gcode:
  {% set length = params.LENGTH | default(2.0) | float %}
  {% set speed = params.SPEED | default(35) | float %}
  
  {% if printer.toolhead.extruder != '' and printer[printer.toolhead.extruder].can_extrude %}
    M83
    G1 E{length} F{speed * 60}
    M82
  {% else %}
    RESPOND MSG="Extrusor frio! Comando de extrusao abortado."
  {% endif %}

[gcode_macro _CLIENT_RETRACT]
description: Auxiliar de retracao controlada
gcode:
  {% set length = params.LENGTH | default(5.0) | float %}
  {% set speed = params.SPEED | default(35) | float %}
  _CLIENT_EXTRUDE LENGTH=-{length | abs} SPEED={speed}

# ====================================================================
# CONTROLO DE CAMADAS (LAYERS) VIA FATIADOR
# ====================================================================
[gcode_macro SET_PAUSE_NEXT_LAYER]
description: Programa uma pausa automática para a proxima camada
gcode:
  {% set ENABLE = params.ENABLE | default(1) | int %}
  {% set MACRO = params.MACRO | default("PAUSE") %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_next_layer VALUE="{{ 'enable': ENABLE, 'call': MACRO }}"

[gcode_macro SET_PAUSE_AT_LAYER]
description: Programa uma pausa automática para uma camada especifica
gcode:
  {% set ENABLE = params.ENABLE | default(1) | int %}
  {% set LAYER = params.LAYER | default(0) | int %}
  {% set MACRO = params.MACRO | default("PAUSE") %}
  SET_GCODE_VARIABLE MACRO=SET_PRINT_STATS_INFO VARIABLE=pause_at_layer VALUE="{{ 'enable': ENABLE, 'layer': LAYER, 'call': MACRO }}"

[gcode_macro SET_PRINT_STATS_INFO]
rename_existing: SET_PRINT_STATS_INFO_BASE
description: Monitoriza as estatisticas de camada enviadas pelo Slicer
variable_pause_next_layer: { 'enable': False, 'call': "PAUSE" }
variable_pause_at_layer  : { 'enable': False, 'layer': 0, 'call': "PAUSE" }
gcode:
  {% if pause_next_layer.enable %}
    RESPOND TYPE=echo MSG="Pausa agendada executada na proxima camada."
    {pause_next_layer.call}
    SET_PAUSE_NEXT_LAYER ENABLE=0
  {% elif pause_at_layer.enable and params.CURRENT_LAYER is defined and params.CURRENT_LAYER | int == pause_at_layer.layer %}
    RESPOND TYPE=echo MSG="Pausa programada executada na camada especificada."
    {pause_at_layer.call}
    SET_PAUSE_AT_LAYER ENABLE=0
  {% endif %}
  SET_PRINT_STATS_INFO_BASE {rawparams}

# ====================================================================
# REGRAS DE SOBREPOSIÇÃO G-CODE (M109 E M190 RÁPIDOS)
# ====================================================================
[gcode_macro M109]
rename_existing: M99109
description: Aguarda a temperatura do bico sem tempo morto de estabilizacao
gcode:
  {% set s = params.S | default(0) | float %}
  M99109 {rawparams}
  {% if s > 0 %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={s} MAXIMUM={s+1}
  {% endif %}

[gcode_macro M190]
rename_existing: M99190
description: Aguarda a temperatura da mesa sem tempo morto de estabilizacao
gcode:
  {% set s = params.S | default(0) | float %}
  M99190 {rawparams}
  {% if s > 0 %}
    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={s} MAXIMUM={s+1}
  {% endif %}

# ====================================================================
# MACROS DE CALIBRAÇÃO TÉRMICA (PID)
# ====================================================================
[gcode_macro PID_EXTRUDER]
description: Calibracao PID do bico com alvo ajustavel (Ex: PID_EXTRUDER TARGET=220)
gcode:
  {% set target = params.TARGET | default(220) | float %}
  RESPOND MSG="A iniciar calibracao PID do bico a {target}C..."
  PID_CALIBRATE HEATER=extruder TARGET={target}

[gcode_macro PID_BED]
description: Calibracao PID da mesa com alvo ajustavel (Ex: PID_BED TARGET=60)
gcode:
  {% set target = params.TARGET|default(60)|float %}
  RESPOND MSG="A iniciar teste PID da mesa..."
  PID_CALIBRATE HEATER=heater_bed TARGET={target}
  SAVE_CONFIG

# ====================================================================
# GESTÃO MANUAL DE FILAMENTO
# ====================================================================
[gcode_macro LOAD_FILAMENT]
description: Carrega o filamento aquecendo o bico se necessario
variable_load_distance: 40
variable_purge_distance: 30
gcode:
  {% set load_speed = params.LOAD_SPEED | default(1500) | float %}
  {% set purge_speed = params.PURGE_SPEED | default(300) | float %}
  {% set min_temp = params.MIN_TEMP | default(220) | float %}
  {% set turn_off = params.TURN_OFF_EXTRUDER | default(1) | int %}
  
  SAVE_GCODE_STATE NAME=load_state
  {% if printer.extruder.temperature < min_temp %}
    RESPOND MSG="A aquecer o bico para carregar filamento..."
    M109 S{min_temp}
  {% endif %}
  G91
  G92 E0
  G1 E{load_distance} F{load_speed}
  G1 E{purge_distance} F{purge_speed}
  {% if turn_off == 1 %}
    M104 S0
  {% endif %}
  RESTORE_GCODE_STATE NAME=load_state
  RESPOND MSG="Filamento carregado com sucesso!"

[gcode_macro UNLOAD_FILAMENT]
description: Descarrega o filamento com purga de alivio inicial
variable_unload_distance: 80
variable_purge_distance: 20
gcode:
  {% set unload_speed = params.UNLOAD_SPEED | default(1500) | float %}
  {% set purge_speed = params.PURGE_SPEED | default(300) | float %}
  {% set min_temp = params.MIN_TEMP | default(220) | float %}
  {% set turn_off = params.TURN_OFF_EXTRUDER | default(1) | int %}
  
  SAVE_GCODE_STATE NAME=unload_state
  {% if printer.extruder.temperature < min_temp %}
    RESPOND MSG="A aquecer o bico para descarregar filamento..."
    M109 S{min_temp}
  {% endif %}
  G91
  G92 E0
  G1 E{purge_distance} F{purge_speed}
  G1 E-{unload_distance} F{unload_speed}
  {% if turn_off == 1 %}
    M104 S0
  {% endif %}
  RESTORE_GCODE_STATE NAME=unload_state
  RESPOND MSG="Filamento descarregado com sucesso!"

# ====================================================================
# PURGA NO AR COM ALERTAS VISUAIS NO ECRÃ
# ====================================================================
[gcode_macro PURGAR_FILAMENTO_NO_AR]
description: Eleva a cabeca 5cm e efetua uma purga de filamento no ar
variable_temperatura: 220
variable_comprimento_mm: 50
gcode:
  {% set TEMP = params.TEMPERATURA | default(temperatura) | float %}
  {% set COMPRIMENTO = params.COMPRIMENTO_MM | default(comprimento_mm) | float %}
  
  RESPOND MSG="A preparar purga no ar: A subir e a aquecer..."
  M117 Aquecendo...
  CHOME
  
  G90                        
  G1 Z50 F1500               
  G1 X110 Y110 F12000         
  
  M109 S{TEMP}
  RESPOND MSG="Bico quente. A purgar filamento..."
  M117 Purgando...
  
  M83                        
  G1 E{COMPRIMENTO} F150     
  G4 P1000                   
  G1 E-2 F1200
  M82
  
  RESPOND MSG="Purga concluida com sucesso!"
  M117 Pronto!

# ====================================================================
# PURGA ADAPTATIVA INTELIGENTE (KAMP SIMPLIFICADO)
# ====================================================================
[gcode_macro ADAPTIVE_LINE_PURGE]
description: Desenha a linha de purga adaptativa rente ao objecto do fatiador
variable_purge_height: 0.3 
variable_tip_distance: 4 
variable_purge_margin: 10 
variable_purge_amount: 40 
variable_flow_rate: 12 
gcode:
  {% set travel_speed = 16200 %} ; 270mm/s * 60 para a Ender 3 V3 SE
  {% set RETRACT = 'G10' if printer.firmware_retraction is defined else 'G1 E-0.5 F2100' %}
  {% set UNRETRACT = 'G11' if printer.firmware_retraction is defined else 'G1 E0.5 F2100' %}
  
  {% set all_points = printer.exclude_object.objects | map(attribute='polygon') | sum(start=[]) %}
  {% set x_min = all_points | map(attribute=0) | min | default(10) %}
  {% set x_max = all_points | map(attribute=0) | max | default(50) %}
  {% set y_min = all_points | map(attribute=1) | min | default(10) %}
  
  {% set x_start = [x_min - purge_margin, 10] | max %}
  {% set y_start = [y_min - purge_margin, 10] | max %}
  {% set purge_move_speed = (flow_rate / (purge_height * 0.4)) * 60 | float %}
  
  SAVE_GCODE_STATE NAME=prepurge_state
  G92 E0
  G0 F{travel_speed}
  G90
  G0 X{x_start} Y{y_start}
  G0 Z{purge_height}
  
  M83
  G1 E{tip_distance} F2400
  G1 X{x_start + purge_amount} E{purge_amount} F{purge_move_speed}
  
  {RETRACT}
  G0 X{x_start + purge_amount + 10} F{travel_speed}
  G0 Z{purge_height * 2} F{travel_speed}
  
  {UNRETRACT}
  G92 E0
  M82
  RESTORE_GCODE_STATE NAME=prepurge_state

# ====================================================================
# INTEGRAÇÃO COM GITHUB (BACKUP / RESTAURO DE SEGURANÇA VIA SHELL)
# ====================================================================
[gcode_shell_command backup_cfg]
command: /home/klipper/printer_data/config/autocommit.sh
timeout: 30.0
verbose: True

[gcode_macro BACKUP_GITHUB]
description: Envia todas as configuracoes atuais para o teu GitHub privado
gcode:
  RESPOND MSG="Klipper Backup: A enviar ficheiros para o GitHub..."
  RUN_SHELL_COMMAND CMD=backup_cfg

[gcode_shell_command restaurar_cfg]
command: /home/klipper/printer_data/config/restore.sh
timeout: 30.0
verbose: True

[gcode_macro RESTAURAR_GITHUB]
description: Apaga as configuracoes locais e puxa a versao limpa do GitHub
gcode:
  RESPOND MSG="Atencao: A iniciar restauro total do sistema a partir do GitHub..."
  M117 Restaurando...
  RUN_SHELL_COMMAND CMD=restaurar_cfg
  G4 P2000
  RESPOND MSG="Restauro concluido com sucesso! A reiniciar o firmware..."
  M117 Concluido!
  SAVE_CONFIG

# ====================================================================
# ALERTAS SONOROS E GESTÃO DE SYSTEMA
# ====================================================================
[gcode_macro BEEP]
description: Emite um bip sonoro físico se o pino estiver configurado
gcode:
  {% set duration = params.P | default(100) | float %}
  {% if 'output_pin beeper' in printer %}
    SET_PIN PIN=beeper VALUE=1
    G4 P{duration}
    SET_PIN PIN=beeper VALUE=0
  {% else %}
    RESPOND MSG="BEEP chamado (Buzzer nao mapeado no printer.cfg)."
  {% endif %}

[gcode_macro OFF]
description: Corta energia de motores, aquecedores e ventiladores
gcode:
  M84
  TURN_OFF_HEATERS
  M107
  


